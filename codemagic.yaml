workflows:
  react-native-ios:
    name: React Native iOS App Store
    max_build_duration: 120
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: Bible

    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.coralspiritual.bibleapp
      vars:
        BUNDLE_ID: "com.coralspiritual.bibleapp"
        SENTRY_DISABLE_AUTO_UPLOAD: "true"
        EXPO_NO_DEV_CLIENT: "true"  
        EXPO_NO_DEV_MENU: "true"  
      node: 18
      xcode: 16.4
      cocoapods: default

    scripts:
      - name: Install npm dependencies
        script: |
          cd $CM_BUILD_DIR
          npm install

      - name: Clean cache
        script: |
          cd $CM_BUILD_DIR
          rm -rf node_modules/.cache
          rm -rf ios/build
          pod cache clean --all

      - name: Prebuild iOS native project
        script: |
          cd $CM_BUILD_DIR
          npx expo prebuild --platform ios --clean

      - name: Install pods
        script: |
          cd $CM_BUILD_DIR/ios
          pod repo update
          pod install --repo-update

      - name: Set up node for Xcode
        script: |
          cd $CM_BUILD_DIR
          echo "export NODE_BINARY=$(which node)" > ios/.xcode.env.local

      - name: Set up provisioning profiles
        script: |
          xcode-project use-profiles

      - name: Build archive
        script: |
          cd $CM_BUILD_DIR
          
          xcodebuild -workspace "ios/bible.xcworkspace" \
            -scheme "bible" \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -archivePath "$CM_BUILD_DIR/build/ios/xcarchive/bible.xcarchive" \
            archive \
            -allowProvisioningUpdates \
            -allowProvisioningDeviceRegistration \
            IPHONEOS_DEPLOYMENT_TARGET=14.0 \
            ENABLE_PREVIEWS=NO

      - name: Export IPA
        script: |
          cd $CM_BUILD_DIR
          
          cat > /tmp/ExportOptions.plist << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store</string>
            <key>uploadSymbols</key>
            <true/>
            <key>signingStyle</key>
            <string>automatic</string>
          </dict>
          </plist>
          EOF
          
          xcodebuild -exportArchive \
            -archivePath "$CM_BUILD_DIR/build/ios/xcarchive/bible.xcarchive" \
            -exportPath "$CM_BUILD_DIR/build/ios/ipa" \
            -exportOptionsPlist /tmp/ExportOptions.plist \
            -allowProvisioningUpdates

    artifacts:
      - build/ios/ipa/*.ipa

    publishing:
      email:
        recipients:
          - gbasovv@gmail.com
        notify:
          success: true
          failure: true
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        submit_to_app_store: false