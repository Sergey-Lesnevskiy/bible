workflows:
  react-native-ios:
    name: React Native iOS App Store
    max_build_duration: 120
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: Bible

    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.coralspiritual.bibleapp
      vars:
        BUNDLE_ID: "com.coralspiritual.bibleapp"
        SENTRY_DISABLE_AUTO_UPLOAD: "true"
      node: 22.18.0
      xcode: 16.4
      cocoapods: default

    scripts:
      - name: Install npm dependencies
        script: |
          cd $CM_BUILD_DIR
          npm install --save-dev @react-native/metro-config @react-native-community/cli
          npm install

      - name: Clean cache
        script: |
          cd $CM_BUILD_DIR
          rm -rf node_modules/.cache
          rm -rf ios/Pods ios/Podfile.lock ios/build ios/DerivedData
          pod cache clean --all

      - name: Prebuild iOS native project
        script: |
          cd $CM_BUILD_DIR
          npx expo prebuild --platform ios --clean

      - name: Install pods
        script: |
          cd $CM_BUILD_DIR/ios
          pod repo update
          pod install --repo-update

      - name: Set up provisioning profiles
        script: |
          xcode-project use-profiles --verbose

      - name: Manual bundling
        script: |
          cd $CM_BUILD_DIR
          
          echo "Node version: $(node --version)"
          
          npx react-native bundle \
            --platform ios \
            --dev false \
            --entry-file index.ts \
            --bundle-output ios/main.jsbundle \
            --assets-dest ios
          
          if [ ! -f "ios/main.jsbundle" ]; then
            npx react-native bundle \
              --platform ios \
              --dev false \
              --entry-file index.js \
              --bundle-output ios/main.jsbundle \
              --assets-dest ios
          fi
          
          if [ -f "ios/main.jsbundle" ]; then
            echo "✅ Bundle created: $(ls -lh ios/main.jsbundle)"
          else
            echo "❌ Bundle creation failed"
            exit 1
          fi

      - name: Build archive
        script: |
          cd $CM_BUILD_DIR
          
          xcodebuild -workspace "ios/bible.xcworkspace" \
            -scheme "bible" \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -archivePath "$CM_BUILD_DIR/build/ios/xcarchive/bible.xcarchive" \
            archive \
            -allowProvisioningUpdates \
            -allowProvisioningDeviceRegistration \
            IPHONEOS_DEPLOYMENT_TARGET=14.0

    artifacts:
      - build/ios/xcarchive/*.xcarchive

    publishing:
      email:
        recipients:
          - gbasovv@gmail.com
        notify:
          success: true
          failure: false