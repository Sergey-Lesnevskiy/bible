workflows:
  react-native-ios:
    name: React Native iOS App Store
    max_build_duration: 120
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: Bible

    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.coralspiritual.bibleapp
      vars:
        BUNDLE_ID: "com.coralspiritual.bibleapp"
        SENTRY_DISABLE_AUTO_UPLOAD: "true"
      node: 18
      xcode: 16.4
      cocoapods: default

    scripts:
      - name: Install npm dependencies
        script: |
          cd $CM_BUILD_DIR
          npm install

      - name: Clean cache
        script: |
          cd $CM_BUILD_DIR
          rm -rf node_modules/.cache
          rm -rf ios/Pods ios/Podfile.lock ios/build ios/DerivedData
          pod cache clean --all

      - name: Prebuild iOS native project
        script: |
          cd $CM_BUILD_DIR
          npx expo prebuild --platform ios --clean

      - name: Install pods
        script: |
          cd $CM_BUILD_DIR/ios
          pod repo update
          pod install --repo-update

      - name: Setup environment for bundling
        script: |
          cd $CM_BUILD_DIR
          echo "export NODE_BINARY=/usr/local/bin/node" > ios/.xcode.env.local
          echo "export NODE_BINARY=/usr/local/bin/node" > .xcode.env.local
          
          # Создаем символическую ссылку на node в стандартное место
          sudo ln -sf /usr/local/bin/node /usr/bin/node || true
          
          # Проверяем
          /usr/local/bin/node --version
          which node

      - name: Fix bundling script
        script: |
          cd $CM_BUILD_DIR/ios
          
          # Бэкап оригинального скрипта
          if [ -f "../node_modules/react-native/scripts/react-native-xcode.sh" ]; then
            cp ../node_modules/react-native/scripts/react-native-xcode.sh ../node_modules/react-native/scripts/react-native-xcode.sh.backup
          fi
          
          # Создаем обертку для бандлинга
          cat > bundle_react_native.sh << 'EOF'
          #!/bin/bash
          export NODE_BINARY=/usr/local/bin/node
          export NODE_OPTIONS="--max-old-space-size=4096"
          export PATH="/usr/local/bin:$PATH"
          
          echo "=== Bundle React Native ==="
          echo "NODE_BINARY: $NODE_BINARY"
          $NODE_BINARY --version
          
          # Запускаем оригинальный скрипт
          SCRIPT_PATH="$PWD/../node_modules/react-native/scripts/react-native-xcode.sh"
          if [ -f "$SCRIPT_PATH" ]; then
            echo "Running: $SCRIPT_PATH"
            /bin/bash "$SCRIPT_PATH"
          else
            echo "ERROR: react-native-xcode.sh not found at $SCRIPT_PATH"
            exit 1
          fi
          EOF
          
          chmod +x bundle_react_native.sh
          
          # Модифицируем проект для использования нашей обертки
          cd ..
          sed -i '' 's|../node_modules/react-native/scripts/react-native-xcode.sh|ios/bundle_react_native.sh|g' ios/bible.xcodeproj/project.pbxproj || true

      - name: Set up provisioning profiles
        script: |
          xcode-project use-profiles

      - name: Build archive
        script: |
          cd $CM_BUILD_DIR
          
          # Очищаем DerivedData
          rm -rf ~/Library/Developer/Xcode/DerivedData/bible-*
          
          # Принудительно экспортируем PATH
          export PATH="/usr/local/bin:$PATH"
          export NODE_BINARY=/usr/local/bin/node
          
          xcodebuild -workspace "ios/bible.xcworkspace" \
            -scheme "bible" \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -archivePath "$CM_BUILD_DIR/build/ios/xcarchive/bible.xcarchive" \
            archive \
            -allowProvisioningUpdates \
            -allowProvisioningDeviceRegistration \
            IPHONEOS_DEPLOYMENT_TARGET=14.0 \
            ENABLE_PREVIEWS=NO

      - name: Export IPA
        script: |
          cd $CM_BUILD_DIR
          
          cat > /tmp/ExportOptions.plist << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store</string>
            <key>uploadSymbols</key>
            <true/>
            <key>signingStyle</key>
            <string>automatic</string>
          </dict>
          </plist>
          EOF
          
          xcodebuild -exportArchive \
            -archivePath "$CM_BUILD_DIR/build/ios/xcarchive/bible.xcarchive" \
            -exportPath "$CM_BUILD_DIR/build/ios/ipa" \
            -exportOptionsPlist /tmp/ExportOptions.plist \
            -allowProvisioningUpdates

    artifacts:
      - build/ios/ipa/*.ipa

    publishing:
      email:
        recipients:
          - gbasovv@gmail.com
        notify:
          success: true
          failure: true
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        submit_to_app_store: false