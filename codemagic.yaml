workflows:
  react-native-ios:
    name: React Native iOS App Store
    max_build_duration: 120
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: Bible

    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.coralspiritual.bibleapp
      vars:
        BUNDLE_ID: "com.coralspiritual.bibleapp"
        SENTRY_DISABLE_AUTO_UPLOAD: "true"
      node: 22  # 🔥 ИЗМЕНЕНО с 18 на 22
      xcode: 16.4
      cocoapods: default

    scripts:
      - name: Install npm dependencies
        script: |
          cd $CM_BUILD_DIR
          # Устанавливаем недостающие пакеты
          npm install --save-dev @react-native/metro-config @react-native-community/cli
          npm install

      - name: Clean cache
        script: |
          cd $CM_BUILD_DIR
          rm -rf node_modules/.cache
          rm -rf ios/Pods ios/Podfile.lock ios/build ios/DerivedData
          pod cache clean --all

      - name: Prebuild iOS native project
        script: |
          cd $CM_BUILD_DIR
          npx expo prebuild --platform ios --clean

      - name: Install pods
        script: |
          cd $CM_BUILD_DIR/ios
          pod repo update
          pod install --repo-update

      - name: Set up provisioning profiles
        script: |
          xcode-project use-profiles

      - name: Manual bundling and archive
        script: |
          cd $CM_BUILD_DIR
          
          # Проверяем версию Node
          node --version
          
          # Создаем bundle
          echo "Creating main.jsbundle..."
          npx react-native bundle \
            --platform ios \
            --dev false \
            --entry-file index.ts \
            --bundle-output ios/main.jsbundle \
            --assets-dest ios \
            --verbose
          
          if [ ! -f "ios/main.jsbundle" ]; then
            echo "❌ Bundle creation failed"
            exit 1
          fi
          
          echo "✅ Bundle created: $(ls -lh ios/main.jsbundle)"
          
          # Заглушка для Xcode
          cat > ios/bundle_stub.sh << 'EOF'
          #!/bin/bash
          echo "Skipping automatic bundling"
          exit 0
          EOF
          chmod +x ios/bundle_stub.sh
          
          # Отключаем автоматический бандлинг
          sed -i '' 's|../node_modules/react-native/scripts/react-native-xcode.sh|bundle_stub.sh|g' ios/bible.xcodeproj/project.pbxproj || true
          
          # Архивация
          xcodebuild -workspace "ios/bible.xcworkspace" \
            -scheme "bible" \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -archivePath "$CM_BUILD_DIR/build/ios/xcarchive/bible.xcarchive" \
            archive \
            -allowProvisioningUpdates \
            -allowProvisioningDeviceRegistration \
            IPHONEOS_DEPLOYMENT_TARGET=14.0

      - name: Export IPA
        script: |
          cd $CM_BUILD_DIR
          
          cat > /tmp/ExportOptions.plist << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store</string>
            <key>uploadSymbols</key>
            <true/>
            <key>signingStyle</key>
            <string>automatic</string>
          </dict>
          </plist>
          EOF
          
          xcodebuild -exportArchive \
            -archivePath "$CM_BUILD_DIR/build/ios/xcarchive/bible.xcarchive" \
            -exportPath "$CM_BUILD_DIR/build/ios/ipa" \
            -exportOptionsPlist /tmp/ExportOptions.plist \
            -allowProvisioningUpdates

    artifacts:
      - build/ios/ipa/*.ipa

    publishing:
      email:
        recipients:
          - gbasovv@gmail.com
        notify:
          success: true
          failure: true
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        submit_to_app_store: false